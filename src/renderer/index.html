<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; font-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino Block App</title>
  <link rel="stylesheet" href="renderer.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #3e3e3e;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e8e8e8;
      margin-right: auto;
    }

    #toolbar button {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    #btn-generate {
      background: #0e7ac4;
      color: #fff;
    }
    #btn-generate:hover { background: #1089d4; }

    #btn-clear {
      background: #3e3e3e;
      color: #d4d4d4;
    }
    #btn-clear:hover { background: #4e4e4e; }

    #btn-verify {
      background: #2e8b57;
      color: #fff;
    }
    #btn-verify:hover { background: #36a366; }
    #btn-verify:disabled { background: #3e3e3e; color: #7d7d7d; cursor: default; }

    #workspace-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #blockly-div {
      flex: 1;
      height: 100%;
      min-width: 0;
    }

    #splitter {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: #3e3e3e;
      transition: background 0.15s;
    }
    #splitter:hover { background: #0e7ac4; }

    #output-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #3e3e3e;
      background: #252526;
      flex-shrink: 0;
    }

    #output-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #3e3e3e;
    }

    #output-header h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9d9d9d;
      margin-right: auto;
    }

    #btn-sync {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      background: #3e3e3e;
      color: #d4d4d4;
      transition: background 0.15s;
    }
    #btn-sync:hover { background: #4e4e4e; }

    #monaco-container {
      flex: 1;
      min-height: 0;
    }

    /* Toolbox — dark theme so category labels are readable */
    .blocklyToolboxDiv {
      background: #252526 !important;
    }
    .blocklyTreeLabel {
      color: #e8e8e8 !important;
    }
    .blocklyTreeRow:hover {
      background: #333334 !important;
    }

    /* Verify output console (hidden until first verify) */
    #console {
      height: 170px;
      display: none;
      flex-direction: column;
      flex-shrink: 0;
      border-top: 1px solid #3e3e3e;
      background: #181818;
    }
    #console.visible { display: flex; }

    #console-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-bottom: 1px solid #3e3e3e;
    }

    #console-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9d9d9d;
    }

    #console-status { font-size: 12px; margin-right: auto; }
    #console-status.ok    { color: #4ec94e; }
    #console-status.error { color: #f48771; }
    #console-status.busy  { color: #d7ba7d; }

    #btn-console-close {
      background: none;
      border: none;
      color: #9d9d9d;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }
    #btn-console-close:hover { color: #e8e8e8; }

    #console-output {
      flex: 1;
      overflow: auto;
      padding: 8px 12px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: #d4d4d4;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Arduino Block App</h1>
    <button id="btn-clear">Clear</button>
    <button id="btn-verify">✓ Verify</button>
  </div>

  <div id="workspace-container">
    <div id="blockly-div"></div>
    <div id="splitter"></div>
    <div id="output-panel">
      <div id="output-header">
        <h2>Generated Code</h2>
        <button id="btn-sync">Sync from Blocks</button>
      </div>
      <div id="monaco-container"></div>
    </div>
  </div>

  <div id="console">
    <div id="console-header">
      <span id="console-title">Output</span>
      <span id="console-status"></span>
      <button id="btn-console-close" title="Close">×</button>
    </div>
    <pre id="console-output"></pre>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
